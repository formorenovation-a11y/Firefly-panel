/* ============================================================
   PWA — App instalable con ícono de Firefly
   ============================================================ */
function setupPWA(){
  const canvas=document.createElement('canvas');
  canvas.width=512;canvas.height=512;
  const ctx=canvas.getContext('2d');
  drawFireflyIcon(ctx,512,512);
  const iconUrl=canvas.toDataURL('image/png');

  // Apple touch icon (iOS "Añadir a pantalla de inicio")
  let li=document.getElementById('ffTouchIcon');
  if(li)li.href=iconUrl;

  // Favicon
  let fav=document.querySelector("link[rel='icon']")||document.createElement('link');
  fav.rel='icon';fav.type='image/png';fav.href=iconUrl;
  if(!fav.parentNode)document.head.appendChild(fav);

  // Web App Manifest (permite instalar como app en Android/Chrome)
  const manifest={
    name:'Firefly · Panel Operativo',short_name:'Firefly',
    description:'Panel operativo de ventas, despacho e inventario',
    start_url:'.',display:'standalone',orientation:'any',
    background_color:'#0A0A0B',theme_color:'#0A0A0B',
    icons:[
      {src:iconUrl,sizes:'192x192',type:'image/png'},
      {src:iconUrl,sizes:'512x512',type:'image/png'}
    ]
  };
  const mUrl='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
  let ml=document.getElementById('ffManifest');
  if(ml)ml.href=mUrl;
}

function drawFireflyIcon(ctx,w,h){
  // Fondo negro
  ctx.fillStyle='#000000';ctx.fillRect(0,0,w,h);
  const cx=w*0.5,cy=h*0.37,r=w*0.21;
  ctx.strokeStyle='#CDEB45';ctx.lineCap='round';ctx.lineJoin='round';

  // Óvalo exterior
  ctx.lineWidth=w*0.027;
  ctx.beginPath();ctx.ellipse(cx,cy,r*0.85,r*1.08,0,0,Math.PI*2);ctx.stroke();

  // Loop diagonal izq → der
  ctx.lineWidth=w*0.025;
  ctx.beginPath();
  ctx.moveTo(cx-r*0.42,cy-r*0.98);
  ctx.bezierCurveTo(cx+r*1.15,cy-r*0.1,cx-r*1.15,cy+r*0.1,cx+r*0.42,cy+r*0.98);
  ctx.stroke();

  // Loop diagonal der → izq
  ctx.beginPath();
  ctx.moveTo(cx+r*0.42,cy-r*0.98);
  ctx.bezierCurveTo(cx-r*1.15,cy-r*0.1,cx+r*1.15,cy+r*0.1,cx-r*0.42,cy+r*0.98);
  ctx.stroke();

  // Loop vertical centro (dos arcos)
  ctx.beginPath();
  ctx.moveTo(cx,cy-r*1.08);
  ctx.bezierCurveTo(cx+r*0.65,cy-r*0.28,cx+r*0.65,cy+r*0.28,cx,cy+r*1.08);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx,cy-r*1.08);
  ctx.bezierCurveTo(cx-r*0.65,cy-r*0.28,cx-r*0.65,cy+r*0.28,cx,cy+r*1.08);
  ctx.stroke();

  // Rayas arriba
  ctx.lineWidth=w*0.02;
  for(let i=-1;i<=1;i++){
    ctx.beginPath();ctx.moveTo(cx+i*r*0.38,cy-r*1.17);ctx.lineTo(cx+i*r*0.38,cy-r*1.46);ctx.stroke();
  }
  // Rayas abajo
  for(let i=-1;i<=1;i++){
    ctx.beginPath();ctx.moveTo(cx+i*r*0.38,cy+r*1.12);ctx.lineTo(cx+i*r*0.38,cy+r*1.38);ctx.stroke();
  }

  // Estrellas/sparkles alrededor del ícono (+)
  ctx.lineWidth=w*0.016;
  const stars=[[-1.45,-0.55],[1.45,-0.55],[-1.52,0.18],[1.52,0.18],[-0.55,-1.42],[0.55,-1.42]];
  for(const[dx,dy]of stars){
    const sx=cx+r*dx,sy=cy+r*dy,sr=w*0.018;
    ctx.beginPath();ctx.moveTo(sx-sr,sy);ctx.lineTo(sx+sr,sy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,sy-sr);ctx.lineTo(sx,sy+sr);ctx.stroke();
  }

  // Texto "firefly" en blanco
  const ty=h*0.76;
  ctx.fillStyle='#FFFFFF';
  ctx.font=`900 ${w*0.2}px "SF Pro Rounded","Arial Rounded MT Bold",Arial,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('firefly',cx,ty);

  // Puntitos verde lima alrededor del texto
  ctx.fillStyle='#CDEB45';
  const dots=[[0.14,0.66],[0.86,0.66],[0.08,0.76],[0.92,0.76],
              [0.2,0.64],[0.8,0.64],[0.28,0.86],[0.72,0.86]];
  for(const[dx,dy]of dots){
    ctx.beginPath();ctx.arc(dx*w,dy*h,w*0.009,0,Math.PI*2);ctx.fill();
  }
}

/* ── Importar JSON (respaldo o histórico de pedidos) ── */
async function importData(file){
  if(!file)return;
  try{
    const txt=await file.text();
    const data=JSON.parse(txt);

    // Detectar formato: respaldo completo vs import de pedidos
    const isPedidosOnly=!!(data.pedidos&&!data.config&&Object.keys(data).filter(k=>!k.startsWith('_')).length<=2);
    const totalItems=isPedidosOnly
      ?(data.pedidos||[]).length
      :STORES_EXP.reduce((a,s)=>a+(data[s]?.length||0),0);

    const desc=isPedidosOnly
      ?`Se cargarán <b>${totalItems} pedidos históricos</b> a Firestore.`
      :`Se cargarán <b>${totalItems} registros</b> de respaldo a Firestore.`;

    confirmSheet(`¿Importar datos?`,desc,async()=>{
      let n=0;
      if(isPedidosOnly){
        for(const p of data.pedidos||[]){await dbPut('pedidos',p);n++;}
      }else{
        for(const s of STORES_EXP){
          if(data[s]){for(const o of data[s]){await dbPut(s,o);n++;}}
        }
      }
      S.cache={};
      toast(`${n} registros importados ✓`,'ok');
      closeSheet();go('dash');
    });
  }catch(e){toast('Archivo inválido: '+e.message,'bad');}
}

  _draft._condMayor=m.condicion||'CONTADO';
  // Pre-llenar precio de los ítems si hay producto seleccionado
  if(_draft.items.length&&m.precioUnitario>0){
    _draft.items=_draft.items.map(i=>({...i,precio:m.precioUnitario}));
  }
  renderOrderSheet();
}

/* ---- Sheet & confirm ---- */
function openSheet(html){$('#sheetBody').innerHTML=html;$('#scrim').classList.add('show');document.body.style.overflow='hidden';}
function closeSheet(){$('#scrim').classList.remove('show');document.body.style.overflow='';}
function confirmSheet(title,msg,onYes){
  openSheet(`<div class="sh-head"><h3>${esc(title)}</h3></div>${msg?`<p style="color:var(--muted);margin-top:-4px;font-size:14px">${esc(msg)}</p>`:''}
   <button class="btn dang full" id="cfYes">Sí, continuar</button>
   <button class="btn gho full" style="margin-top:9px" onclick="closeSheet()">Cancelar</button>`);
  $('#cfYes').onclick=onYes;}
</script>
</body>
</html>
