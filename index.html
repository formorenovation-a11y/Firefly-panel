   ============================================================ */
let _srchDebounce=null;
let _srchLastQ='';

function openSearch(){
  document.getElementById('searchOverlay').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('searchInput')?.focus(),80);
  renderSearchHome();
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('show');
  document.body.style.overflow='';
  const inp=document.getElementById('searchInput');
  if(inp)inp.value='';
  _srchLastQ='';
}
// Cerrar con Escape global
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('searchOverlay')?.classList.contains('show'))closeSearch();});

function onSearchInput(val){
  clearTimeout(_srchDebounce);
  const q=val.trim();
  if(!q){renderSearchHome();return;}
  if(q===_srchLastQ)return;
  _srchLastQ=q;
  // Búsqueda local instantánea
  localSearch(q).then(res=>renderSearchResults(q,res));
  // IA para preguntas complejas (debounce 900ms)
  const esCompleja=q.length>12||/cuánto|cuanto|total|venta|pedido|frank|adnan|roque|marie|sede|mes|semana|hoy|pagar|deb[eé]|ganancia|stock|inventario|quién|quien|cuál|cual|\?/i.test(q);
  if(esCompleja){
    showAiThinking();
    _srchDebounce=setTimeout(()=>aiSearch(q),900);
  }
}

/* ── Búsqueda local sobre pedidos ── */
async function localSearch(q){
  const ql=q.toLowerCase().replace(/\s+/g,' ');
  const peds=await dbAll('pedidos');
  const sedes=await dbAll('sedes'); S.cache.sedes=sedes;
  // Detectar si es número de teléfono
  const isPhone=q.replace(/\D/g,'').length>=7;
  const pedResults=peds.filter(p=>{
    const n=(p.cliente?.nombre||'').toLowerCase();
    const tel=(p.cliente?.telefono||'').replace(/\D/g,'');
    const cod=(p.codigo||'').toLowerCase();
    const vend=(p.vendedorNombre||'').toLowerCase();
    const zona=(p.cliente?.zona||'').toLowerCase();
    const ag=(p.agenciaEnvio||'').toLowerCase();
    if(isPhone)return tel.includes(q.replace(/\D/g,''));
    return n.includes(ql)||cod.includes(ql)||vend.includes(ql)||zona.includes(ql)||ag.includes(ql);
  }).sort((a,b)=>b.fecha-a.fecha).slice(0,7);
  return{pedidos:pedResults,sedes};
}

  const prod=(S.cache.prods||[]).find(p=>p.id===promo.productoId&&p.activo);
  if(!prod){toast('Producto no disponible','bad');return;}
  const punit=promo.precioTotal/promo.cantidad;
  const pfinal=_draft._divisas?Math.round(punit*(1-(prod.divisasPct||0)/100)*100)/100:Math.round(punit*100)/100;

    cantidad:promo.cantidad,precio:pfinal,_promoId:promo.id,_promoNombre:promo.nombre}];

  toast(promo.nombre+' aplicado ✓','ok');
}

/* ============================================================
   LIBRO DE MOVIMIENTOS — Auditoría completa
   Consolida: ventas cobradas, vueltos Bs, retiros, gastos,
   conversiones, nómina, garantías en una línea de tiempo
   ============================================================ */
const AUDIT_TIPOS={
  VENTA:     {ic:'💰',label:'Venta cobrada',   col:'var(--ok)'},
  VUELTO_BS: {ic:'💱',label:'Vuelto en Bs',    col:'var(--warn)'},
  RETIRO:    {ic:'↑', label:'Retiro de caja',  col:'var(--bad)'},
  DEPOSITO:  {ic:'↓', label:'Depósito',        col:'var(--ok)'},
  GASTO:     {ic:'📤',label:'Gasto operativo', col:'var(--bad)'},
  CONVERSION:{ic:'🔄',label:'Conversión Bs→$', col:'var(--info)'},
  NOMINA:    {ic:'👤',label:'Nómina',          col:'var(--purple)'},
  GARANTIA:  {ic:'🔧',label:'Garantía',        col:'var(--muted)'},
};

async function buildAuditEntries(desde, hasta){
  const [peds,cajaMvs,egr,convs,invMvs,nomPagos,sedes]=await Promise.all([
    dbAll('pedidos'),dbAll('cajaMovs'),dbAll('egresos'),
    dbAll('conversiones'),dbAll('movimientos'),dbAll('nominaPagos'),dbAll('sedes')
  ]);
  const sedeMap={};sedes.forEach(s=>sedeMap[s.id]=s.codigo);
  const entries=[];

  // 1. Ventas cobradas (de pagos en pedidos)
  peds.forEach(p=>{
    if(p.estado==='CANCELADO')return;
    (p.pagos||[]).forEach(pg=>{
      const ts=pg.ts||p.fecha;
      if(ts<desde||ts>hasta)return;
      entries.push({fecha:ts,tipo:'VENTA',
        concepto:`${p.cliente?.nombre||'Cliente'} · ${pg.metodo}`,
        ref:p.codigo,sede:sedeMap[p.sedeId]||p.sedeId||'—',
        montoUSD:pg.montoUSD||0,montoBs:pg.montoBs||0,tasa:pg.tasa||0,
        responsable:p.vendedorNombre||'—',signo:1,
        detalle:`${esc(p.cliente?.nombre||'')} · ${esc(p.cliente?.telefono||'')} · ${pg.metodo}`});
    });
  });

  // 2. Movimientos de caja (retiros, vueltos, depósitos)
  cajaMvs.forEach(m=>{
    if(m.fecha<desde||m.fecha>hasta)return;
    const tipo=m.esVueltoBs?'VUELTO_BS':m.tipo==='ENTRADA'?'DEPOSITO':'RETIRO';
    entries.push({fecha:m.fecha,tipo,
      concepto:m.concepto,
      ref:m.ref||'—',sede:sedeMap[m.sedeId]||m.sedeId||'—',
      montoUSD:m.montoUSD||0,montoBs:m.montoBs||0,tasa:m.tasa||0,
      responsable:m.responsable||'—',signo:m.tipo==='ENTRADA'?1:-1,
      detalle:m.detalle||m.nota||''});
  });

  // 3. Gastos operativos
  egr.forEach(e=>{
    if(e.fecha<desde||e.fecha>hasta)return;
    entries.push({fecha:e.fecha,tipo:'GASTO',
      concepto:`${e.categoria}: ${e.descripcion||''}`,
      ref:'—',sede:sedeMap[e.sedeId]||'General',
      montoUSD:e.montoUSD||0,montoBs:e.montoBs||0,tasa:e.tasa||0,
      responsable:e.responsable||'—',signo:-1,detalle:e.descripcion||''});
  });

  // 4. Conversiones Bs→$
  convs.forEach(cv=>{
    if(cv.fecha<desde||cv.fecha>hasta)return;
    entries.push({fecha:cv.fecha,tipo:'CONVERSION',
      concepto:`Bs→$ · ${cv.receptor||''}`,
      ref:'—',sede:'—',
      montoUSD:cv.totalUSD||0,montoBs:cv.totalBs||0,tasa:cv.tasaConv||0,
      responsable:cv.responsable||'—',signo:1,
      detalle:`${num(cv.totalBs)} Bs a ${usd(cv.totalUSD)} · tasa ${cv.tasaConv}`});
  });

  // 5. Nómina
  nomPagos.forEach(np=>{
    if(np.fecha<desde||np.fecha>hasta)return;
    entries.push({fecha:np.fecha,tipo:'NOMINA',
      concepto:`${np.empleadoNombre} · ${np.periodo||''}`,
      ref:'—',sede:'—',
      montoUSD:np.total||0,montoBs:0,tasa:0,
      responsable:np.pagadoPor||'—',signo:-1,
      detalle:`${np.metodoPago} · comisión ${usd(np.comision||0)}${np.salario?'+salario '+usd(np.salario):''}`});
  });

  // 6. Garantías (solo las que tienen costo)
  invMvs.filter(m=>m.esGarantia).forEach(m=>{
    if(m.fecha<desde||m.fecha>hasta)return;
    entries.push({fecha:m.fecha,tipo:'GARANTIA',
      concepto:m.nota||'Garantía/Intercambio',
      ref:'—',sede:sedeMap[m.sedeId]||'—',
      montoUSD:0,montoBs:0,tasa:0,
      responsable:'—',signo:0,detalle:m.nota||''});
  });

  return entries.sort((a,b)=>b.fecha-a.fecha);
}

async function abrirLibroMovimientos(periodoKey){
  const periodo=periodoKey||'mes';
  const rango=getRangoFechas(periodo);
  openSheet(`<div class="sh-head"><h3>📋 Libro de movimientos</h3></div>
    <div class="statusbar" style="margin-bottom:14px">
      ${['mes','mes_ant','d30','d90'].map(p=>`<button class="stbtn ${periodo===p?'on':''}" onclick="abrirLibroMovimientos('${p}')">${getRangoFechas(p).label}</button>`).join('')}
    </div>
    <div id="libroBody"><div class="ai-thinking"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Cargando movimientos…</span></div></div>`);
  
  const entries=await buildAuditEntries(rango.desde,rango.hasta);
  
  // Totales
  const totalIn=entries.filter(e=>e.signo>0).reduce((a,e)=>a+e.montoUSD,0);
  const totalOut=entries.filter(e=>e.signo<0).reduce((a,e)=>a+e.montoUSD,0);
  const totalVueltosBs=entries.filter(e=>e.tipo==='VUELTO_BS').reduce((a,e)=>a+e.montoBs,0);

  const el=document.getElementById('libroBody');
  if(!el)return;
  
  if(!entries.length){el.innerHTML=emptyState('📋','Sin movimientos en este período','');return;}

  el.innerHTML=`
    <!-- Resumen -->
    <div class="grid g2" style="margin-bottom:14px">
      <div class="kpi accent"><div class="lab">Entradas</div><div class="val">${usd(totalIn)}</div><div class="delta">${entries.filter(e=>e.signo>0).length} registros</div></div>
      <div class="kpi"><div class="lab">Salidas</div><div class="val down">${usd(totalOut)}</div><div class="delta">${entries.filter(e=>e.signo<0).length} registros</div></div>
    </div>
    ${totalVueltosBs>0?`<div class="alert" style="margin-bottom:12px;font-size:12.5px"><span>💱</span><div>Vueltos en Bs entregados: <b>${num(Math.round(totalVueltosBs))} Bs</b> (${entries.filter(e=>e.tipo==='VUELTO_BS').length} operaciones)</div></div>`:''}
    
    <!-- Leyenda de tipos -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      ${Object.entries(AUDIT_TIPOS).map(([k,v])=>`<div style="font-size:11px;display:flex;align-items:center;gap:4px"><span>${v.ic}</span><span style="color:var(--muted)">${v.label}</span></div>`).join('')}
    </div>

    <!-- Línea de tiempo -->
    ${entries.map(e=>{
      const meta=AUDIT_TIPOS[e.tipo]||{ic:'•',col:'var(--muted)',label:e.tipo};
      const signoStr=e.signo>0?'+':e.signo<0?'−':'';
      const amtCol=e.signo>0?'var(--ok)':e.signo<0?'var(--bad)':'var(--muted)';
      return`<div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)">
        <!-- Icono tipo -->
        <div style="width:34px;height:34px;border-radius:9px;background:${meta.col}18;border:1px solid ${meta.col}33;display:grid;place-items:center;font-size:14px;flex:none">${meta.ic}</div>
        <!-- Info -->
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="font-size:13px;font-weight:600;line-height:1.3">${esc(e.concepto)}</div>
            <div style="text-align:right;flex:none">
              <div class="mono" style="font-weight:700;font-size:14px;color:${amtCol}">${signoStr}${usd(e.montoUSD)}</div>
              ${e.montoBs?`<div style="font-size:11px;color:var(--warn);font-family:var(--mono)">${e.signo<0?'−':''}${num(Math.round(e.montoBs))} Bs</div>`:''}
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap">
            <span style="font-family:var(--mono);font-size:10px;background:var(--panel3);padding:2px 7px;border-radius:5px;color:var(--muted2)">${e.ref!=='—'?e.ref:meta.label}</span>
            <span style="font-size:11px;color:var(--muted2)">${e.sede}</span>
            <span style="font-size:11px;color:var(--muted2)">${fechaCorta(e.fecha)}</span>
            ${e.tasa?`<span style="font-size:10px;color:var(--muted2);font-family:var(--mono)">tasa ${e.tasa}</span>`:''}
          </div>
          ${e.detalle?`<div style="font-size:11.5px;color:var(--muted2);margin-top:2px">${esc(e.detalle)}</div>`:''}
          <div style="font-size:11px;color:var(--muted2);margin-top:1px">por ${esc(e.responsable)}</div>
        </div>
      </div>`;}).join('')}
    <div style="text-align:center;color:var(--muted2);font-size:11.5px;padding:16px 0">${entries.length} registros · ${rango.label}</div>`;
}

/* ── Cambiar vendedor asignado a un pedido ── */
async function cambiarVendedor(pedId){
  const[usuarios,p]=await Promise.all([dbAll('usuarios'),dbGet('pedidos',pedId)]);
  if(!p)return;
  openSheet(`<div class="sh-head"><h3>Vendedor asignado</h3></div>
   <div class="hintline" style="margin-bottom:10px">Asignado actualmente: <b>${esc(p.vendedorNombre||'Sin asignar')}</b></div>
   <div class="list">
     ${usuarios.map(u=>`<div class="li ${p.vendedorId===u.id?'':''}\" onclick="asignarVendedor('${pedId}','${u.id}','${esc(u.nombre)}')">
       <div class="av" style="background:${(u.color||'#54d684')}22;color:${u.color||'#54d684'}">${initials(u.nombre)}</div>
       <div class="gr"><div class="t">${esc(u.nombre)}</div><div class="s" style="text-transform:capitalize">${u.rol}</div></div>
       ${p.vendedorId===u.id?'<span style="color:var(--glow)">✓ actual</span>':'<span style="color:var(--muted2)">›</span>'}
     </div>`).join('')}
   </div>`);
}

async function asignarVendedor(pedId,userId,userName){
  const p=await dbGet('pedidos',pedId);if(!p)return;
  p.vendedorId=userId;p.vendedorNombre=userName;
  await dbPut('pedidos',p);
  // Actualizar cache de usersMap
  if(S.cache.usersMap)S.cache.usersMap[userId]={...S.cache.usersMap[userId],id:userId};
  toast(userName+' asignado a este pedido ✓','ok');
  closeSheet();go(S.route);
}

/* ── Importar JSON (respaldo o histórico de pedidos) ── */
async function importData(file){
  if(!file)return;
  try{
    const txt=await file.text();
    const data=JSON.parse(txt);

    // Detectar formato: respaldo completo vs import de pedidos
    const isPedidosOnly=!!(data.pedidos&&!data.config&&Object.keys(data).filter(k=>!k.startsWith('_')).length<=2);
    const totalItems=isPedidosOnly
      ?(data.pedidos||[]).length
      :STORES_EXP.reduce((a,s)=>a+(data[s]?.length||0),0);

    const desc=isPedidosOnly
      ?`Se cargarán <b>${totalItems} pedidos históricos</b> a Firestore.`
      :`Se cargarán <b>${totalItems} registros</b> de respaldo a Firestore.`;

    confirmSheet(`¿Importar datos?`,desc,async()=>{
      let n=0;
      if(isPedidosOnly){
        for(const p of data.pedidos||[]){await dbPut('pedidos',p);n++;}
      }else{
        for(const s of STORES_EXP){
          if(data[s]){for(const o of data[s]){await dbPut(s,o);n++;}}
        }
      }

/* ============================================================
   CHART HELPERS — SVG donut + barras comparativas verticales
   ============================================================ */
const CHART_PALETTE=['#CDEB45','#5db4f5','#f5b945','#b78bf0','#54d684','#ff6b5e','#f7931a','#7dd3fc'];

function donutChartSVG(data,opts={}){
  // data: [{label,value}]
  const size=opts.size||168, stroke=opts.stroke||22, r=(size-stroke)/2, cx=size/2, cy=size/2;
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  const C=2*Math.PI*r;
  let acc=0;
  const segs=data.map((d,i)=>{
    const frac=d.value/total, len=frac*C;
    const dasharray=`${len} ${C-len}`;
    const dashoffset=C*0.25 - acc; // empezar arriba (12 o'clock)
    acc+=len;
    const col=d.color||CHART_PALETTE[i%CHART_PALETTE.length];
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}"
      stroke-dasharray="${dasharray}" stroke-dashoffset="${dashoffset}" stroke-linecap="butt"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .6s"/>`;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}</svg>`;
}

function donutWithLegend(data,opts={}){
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  const svg=donutChartSVG(data,opts);
  const centerLabel=opts.centerLabel||'';
  const legend=data.map((d,i)=>{
    const col=d.color||CHART_PALETTE[i%CHART_PALETTE.length];
    const pct=Math.round(d.value/total*100);
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">
      <span style="width:9px;height:9px;border-radius:50%;background:${col};flex:none"></span>
      <span style="flex:1;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.label)}</span>
      <span class="mono" style="font-size:11.5px;color:var(--muted);flex:none">${pct}%</span>
      ${opts.showVal?`<span class="mono" style="font-size:11.5px;color:var(--white);min-width:55px;text-align:right;flex:none">${opts.fmtVal?opts.fmtVal(d.value):d.value}</span>`:''}
    </div>`;
  }).join('');
  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <div style="position:relative;flex:none">${svg}
      ${centerLabel?`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-family:var(--mono);font-weight:800;font-size:17px">${centerLabel}</div>
        ${opts.centerSub?`<div style="font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em">${opts.centerSub}</div>`:''}
      </div>`:''}
    </div>
    <div style="flex:1;min-width:140px">${legend}</div>
  </div>`;
}

/* Barras verticales comparativas (tipo Shopify "top staff/products") */
function vBarCompareSVG(data,opts={}){
  // data: [{label,value,sublabel}]
  if(!data.length)return '<div class="empty" style="padding:14px">Sin datos</div>';
  const max=Math.max(1,...data.map(d=>d.value));
  const H=opts.height||130;
  return `<div style="display:flex;align-items:flex-end;gap:${opts.gap||10}px;height:${H+38}px;padding:4px 2px 0;overflow-x:auto">
    ${data.map((d,i)=>{
      const h=Math.max(4,Math.round(d.value/max*H));
      const col=d.color||CHART_PALETTE[i%CHART_PALETTE.length];
      return `<div style="display:flex;flex-direction:column;align-items:center;flex:none;min-width:${opts.barW||44}px">
        <div class="mono" style="font-size:10.5px;font-weight:700;color:${col};margin-bottom:4px;white-space:nowrap">${opts.fmtVal?opts.fmtVal(d.value):d.value}</div>
        <div style="width:${opts.barInnerW||26}px;height:${h}px;background:${col};border-radius:6px 6px 3px 3px;transition:height .5s"></div>
        <div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center;max-width:${opts.barW||44}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.label)}</div>
        ${d.sublabel?`<div style="font-size:9px;color:var(--muted2)">${d.sublabel}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Borrar TODOS los datos del import: pedidos + movimientos + egresos + cajaMovs relacionados ── */
async function borrarPedidosImportados(){
  const todos = await dbAll('pedidos');
  const importados = todos.filter(p => p._importado === true);
  if(!importados.length){toast('No hay pedidos importados para borrar — ya están limpios ✓','ok');return;}

  const ids = new Set(importados.map(p => p.id));
  const [movs,egrs,cajaMvs]=await Promise.all([dbAll('movimientos'),dbAll('egresos'),dbAll('cajaMovs')]);

  // Registros vinculados a los pedidos importados
  const movsRel=movs.filter(m=>m.refPedidoId&&ids.has(m.refPedidoId));
  const egrsRel=egrs.filter(e=>e.refPedidoId&&ids.has(e.refPedidoId));
  const cajaMvsRel=cajaMvs.filter(c=>c.ref&&ids.has(c.ref));

  const resumen=[
    `• <b>${importados.length}</b> pedidos del Excel`,
    movsRel.length?`• <b>${movsRel.length}</b> movimientos de inventario`:'',
    egrsRel.length?`• <b>${egrsRel.length}</b> gastos relacionados`:'',
    cajaMvsRel.length?`• <b>${cajaMvsRel.length}</b> movimientos de caja`:'',
  ].filter(Boolean).join('<br>');

  confirmSheet(
    `¿Borrar todo el import?`,
    `Se eliminarán permanentemente:<br>${resumen}<br><br>Los pedidos creados <b>manualmente NO se tocan</b>. Esta acción no se puede deshacer.`,
    async () => {
      const allToDelete=[
        ...importados.map(p=>['pedidos',p.id]),
        ...movsRel.map(m=>['movimientos',m.id]),
        ...egrsRel.map(e=>['egresos',e.id]),
        ...cajaMvsRel.map(c=>['cajaMovs',c.id]),
      ];
      const total=allToDelete.length, batch=20;
      let done=0;
      for(let i=0;i<allToDelete.length;i+=batch){
        await Promise.all(allToDelete.slice(i,i+batch).map(([col,id])=>dbDel(col,id)));
        done+=Math.min(batch,allToDelete.length-i);
        toast(`Borrando… ${done}/${total}`,'ok');
      }
      S.cache.peds=null;
      toast(`Listo — ${total} registros eliminados. Sistema limpio ✓`,'ok');
      closeSheet();go('dash');
    }
  );
}

    resumen:`tipo ${m.tipo}→${window._cajaTipoEdit}, monto $${m.montoUSD}→${document.getElementById('editCajaUSD')?.value}`,

  m.montoUSD=parseFloat(document.getElementById('editCajaUSD')?.value)||0;
  m.montoBs=parseFloat(document.getElementById('editCajaBs')?.value)||0;
  const ref=document.getElementById('editCajaRef')?.value||'';
  m.ref=ref;m.nota=ref;
  await dbPut('cajaMovs',m);
  toast('Actualizado — cambio registrado con tu nombre ✓','ok');closeSheet();loadCajas();
}
async function anularCajaMov(id){
  const motivo=(document.getElementById('anulaMotivo')?.value||'').trim();
  if(!motivo){toast('Escribe el motivo de la anulación','bad');return;}
  const m=await dbGet('cajaMovs',id);if(!m)return;
  m._anulado=true;m._anuladoPor=S.user.nombre;
  m._anuladoEl=Date.now();m._anuladoMotivo=motivo;
  await dbPut('cajaMovs',m);
  toast('Anulado — queda visible en el historial ✓','ok');closeSheet();loadCajas();
}



/* ============================================================
   PORTAL DEL MOTORIZADO — Mis Entregas
   Flujo: ASIGNADO → ACEPTADO → EN_SITIO → foto + ENTREGADO
   ============================================================ */
async function viewMoto(){
  const v=$('#view');v.innerHTML='<div class="empty">Cargando tus entregas…</div>';
  const [peds,sedes]=await Promise.all([dbAll('pedidos'),dbAll('sedes')]);
  S.cache.sedes=sedes;
  // Pedidos asignados a este motorizado (por usuarioId vinculado o nombre)
  const dels=await dbAll('deliveries');
  const miDel=dels.find(d=>d.usuarioId===S.user.id)||dels.find(d=>d.nombre===S.user.nombre);
  const misPeds=peds.filter(p=>{
    if(p.estado==='CANCELADO')return false;
    const esM=(miDel&&p.deliveryId===miDel.id)||(p.deliveryNombre===S.user.nombre);
    return esM;
  });
  const pendientes=misPeds.filter(p=>['DESPACHADO','EN_CAMINO'].includes(p.estado)).sort((a,b)=>b.fecha-a.fecha);
  const entregadosHoy=misPeds.filter(p=>p.estado==='ENTREGADO'&&new Date(p.fecha).toDateString()===new Date().toDateString());
  const historial=misPeds.filter(p=>p.estado==='ENTREGADO').sort((a,b)=>b.fecha-a.fecha).slice(0,15);

  v.innerHTML=`
  <div class="view-head"><div><div class="eyebrow">Portal de entregas</div><h2>Hola, ${esc(S.user.nombre.split(' ')[0])} 🛵</h2>
    <div class="sub">${pendientes.length} entrega(s) pendiente(s)</div></div>
    <div onclick="editMiPerfilMoto()" style="cursor:pointer">
      ${miDel?.fotoURL?`<img src="${miDel.fotoURL}" style="width:44px;height:44px;border-radius:12px;object-fit:cover;border:2px solid var(--glow)">`:
      `<div style="width:44px;height:44px;border-radius:12px;background:var(--panel2);border:2px solid var(--line);display:grid;place-items:center;font-size:18px">📷</div>`}
    </div>
  </div>
  <div class="grid g2" style="margin-bottom:16px">
    <div class="kpi accent"><div class="lab">Pendientes</div><div class="val">${pendientes.length}</div></div>
    <div class="kpi"><div class="lab">Entregadas hoy</div><div class="val up">${entregadosHoy.length}</div></div>
  </div>

  ${pendientes.length?`
  <div class="sec-title">Entregas activas</div>
  ${pendientes.map(p=>motoCard(p)).join('')}`
  :`<div class="empty" style="padding:40px 0;text-align:center">
    <div style="font-size:44px;margin-bottom:10px">✨</div>
    <div style="font-weight:600">Sin entregas pendientes</div>
    <div style="font-size:13px;color:var(--muted2);margin-top:4px">Cuando te asignen un pedido aparecerá aquí</div>
  </div>`}

  ${historial.length?`
  <div class="sec-title">Historial <span class="h">últimas entregas</span></div>
  <div class="list">
    ${historial.map(p=>`<div class="li">
      <div class="av" style="font-size:12px;background:rgba(84,214,132,.15);color:var(--ok)">✓</div>
      <div class="gr"><div class="t">${esc(p.cliente?.nombre||'—')}</div>
        <div class="s">${esc(p.cliente?.zona||'')} · ${fechaCorta(p.fecha)}</div></div>
      <div class="amt">${usd(p.totalUSD||0)}</div>
    </div>`).join('')}
  </div>`:''}`;
}

function motoCard(p){
  const mEst=p.motoEstado||'ASIGNADO'; // ASIGNADO → ACEPTADO → EN_SITIO
  const debe=(p.totalUSD||0)-(p.totalPagadoUSD||0);
  const items=(p.items||[]).map(i=>`${i.cantidad}× ${i.version}`).join(', ');
  return `<div class="card" style="margin-bottom:12px;border:1px solid ${mEst==='ASIGNADO'?'rgba(245,185,69,.35)':mEst==='ACEPTADO'?'rgba(93,180,245,.35)':'rgba(84,214,132,.35)'}">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-weight:700;font-size:16px">${esc(p.cliente?.nombre||'—')}</div>
        <div style="font-size:12px;color:var(--muted)">${p.codigo} · ${fechaCorta(p.fecha)}</div>
      </div>
      <span class="tag" style="background:${mEst==='ASIGNADO'?'rgba(245,185,69,.15)':mEst==='ACEPTADO'?'rgba(93,180,245,.15)':'rgba(84,214,132,.15)'};color:${mEst==='ASIGNADO'?'var(--warn)':mEst==='ACEPTADO'?'var(--info)':'var(--ok)'}">${mEst==='ASIGNADO'?'Nueva':mEst==='ACEPTADO'?'Aceptada':'En sitio'}</span>
    </div>
    <!-- Productos -->
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">📦 ${items}</div>

    ${mEst==='ASIGNADO'?`
    <!-- Estado 1: solo zona visible, aceptar para ver todo -->
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">📍 Zona: <b style="color:var(--white)">${esc(p.cliente?.zona||'Por confirmar')}</b></div>
    <button class="btn pri full" onclick="motoAceptar('${p.id}')">✓ Aceptar esta entrega</button>`
    :''}

    ${mEst==='ACEPTADO'?`
    <!-- Estado 2: toda la info visible -->
    <div style="background:var(--panel2);border-radius:10px;padding:12px;margin-bottom:12px">
      <div class="stat2"><span class="k">📍 Dirección</span><span class="v" style="font-family:var(--body);font-size:13px;text-align:right;max-width:60%">${esc(p.cliente?.direccion||p.cliente?.zona||'—')}</span></div>
      <div class="stat2"><span class="k">📞 Teléfono</span><span class="v" style="font-family:var(--body)"><a href="tel:${esc(p.cliente?.telefono||'')}" style="color:var(--info)">${esc(p.cliente?.telefono||'—')}</a></span></div>
      <div class="stat2"><span class="k">💰 Cobrar al cliente</span><span class="v" style="color:${debe>0.5?'var(--warn)':'var(--ok)'}">${debe>0.5?usd(debe):'✓ Ya pagó'}</span></div>
      ${p.comentarios?`<div class="stat2"><span class="k">📝 Notas</span><span class="v" style="font-family:var(--body);font-size:12px;text-align:right;max-width:60%">${esc(p.comentarios)}</span></div>`:''}
    </div>
    <div style="display:flex;gap:8px">
      <a href="https://wa.me/${(p.cliente?.telefono||'').replace(/\D/g,'')}" target="_blank" class="btn" style="flex:1;text-align:center;text-decoration:none">💬 WhatsApp</a>
      <button class="btn pri" style="flex:1" onclick="motoEnSitio('${p.id}')">📍 Llegué al sitio</button>
    </div>`
    :''}

    ${mEst==='EN_SITIO'?`
    <!-- Estado 3: subir comprobante y entregar -->
    <div style="background:rgba(84,214,132,.06);border:1px solid rgba(84,214,132,.2);border-radius:10px;padding:12px;margin-bottom:12px">
      <div class="eyebrow" style="color:var(--ok);margin-bottom:8px">Para cerrar la entrega</div>
      ${debe>0.5?`
      <div class="field" style="margin-bottom:10px"><label>Método de pago que usó el cliente</label>
        <select id="motoPagoMet_${p.id}" class="inp">${METODOS.map(m=>`<option>${m}</option>`).join('')}</select></div>
      <div class="field" style="margin-bottom:10px"><label>Monto cobrado $</label>
        <input id="motoPagoMonto_${p.id}" class="inp mono" inputmode="decimal" value="${debe.toFixed(2)}"></div>`
      :'<div style="font-size:12.5px;color:var(--ok);margin-bottom:10px">✓ El cliente ya pagó — solo sube foto de la entrega</div>'}
      <div class="field" style="margin-bottom:0">
        <label>📸 Foto del comprobante ${debe>0.5?'(pago móvil, cash, etc.)':'(entrega)'} <span class="req">*</span></label>
        <input type="file" id="motoFoto_${p.id}" accept="image/*" capture="environment" class="inp" style="padding:10px">
        <div class="hintline">Toma la foto o súbela desde la galería</div>
      </div>
    </div>
    <button class="btn pri full" id="motoEntregarBtn_${p.id}" onclick="motoEntregar('${p.id}')">✓ Confirmar entrega</button>`
    :''}
  </div>`;
}

async function motoAceptar(pedId){
  const p=await dbGet('pedidos',pedId);if(!p)return;
  p.motoEstado='ACEPTADO';
  p.motoAceptadoEl=Date.now();
  p.estado='EN_CAMINO';
  p.timeline=[...(p.timeline||[]),{estado:'EN_CAMINO',ts:Date.now(),por:S.user.nombre,nota:'Aceptada por motorizado'}];
  S.cache.peds=null;
  await dbPut('pedidos',p);
  toast('Entrega aceptada — aquí están los detalles ✓','ok');
  viewMoto();
}

async function motoEnSitio(pedId){
  const p=await dbGet('pedidos',pedId);if(!p)return;
  p.motoEstado='EN_SITIO';
  p.motoEnSitioEl=Date.now();
  S.cache.peds=null;
  await dbPut('pedidos',p);
  toast('Marcado en sitio — completa la entrega','ok');
  viewMoto();
}

async function motoEntregar(pedId){
  const p=await dbGet('pedidos',pedId);if(!p)return;
  const fileInput=document.getElementById('motoFoto_'+pedId);
  const file=fileInput?.files?.[0];
  if(!file){toast('Toma o sube la foto del comprobante primero','bad');return;}
  const btn=document.getElementById('motoEntregarBtn_'+pedId);
  if(btn){btn.textContent='📤 Subiendo foto…';btn.disabled=true;}
  try{
    // Subir foto a Firebase Storage
    const ext=file.name.split('.').pop()||'jpg';
    const path=`comprobantes/${pedId}/${Date.now()}.${ext}`;
    const ref=storage.ref(path);
    await ref.put(file);
    const fotoURL=await ref.getDownloadURL();

    // Registrar pago si el cliente pagó al momento
    const debe=(p.totalUSD||0)-(p.totalPagadoUSD||0);
    if(debe>0.5){
      const met=document.getElementById('motoPagoMet_'+pedId)?.value||'Cash $';
      const monto=parseFloat(document.getElementById('motoPagoMonto_'+pedId)?.value)||debe;
      const pg={metodo:met,montoUSD:monto,montoBs:0,tasa:0,ref:'entrega',
        ts:Date.now(),por:S.user.nombre,comprobanteURL:fotoURL};
      p.pagos=[...(p.pagos||[]),pg];
      p.totalPagadoUSD=(p.totalPagadoUSD||0)+monto;
    }

    // Cerrar la orden
    p.estado='ENTREGADO';
    p.motoEstado='ENTREGADO';
    p.motoEntregadoEl=Date.now();
    p.comprobanteEntregaURL=fotoURL;
    p.timeline=[...(p.timeline||[]),{estado:'ENTREGADO',ts:Date.now(),por:S.user.nombre,nota:'Entregado con comprobante 📸'}];
    S.cache.peds=null;
    await dbPut('pedidos',p);
    toast('🎉 Entrega completada — comprobante guardado','ok');
    viewMoto();
  }catch(e){
    toast('Error al subir: '+(e.message||e),'bad');
    if(btn){btn.textContent='✓ Confirmar entrega';btn.disabled=false;}
  }
}

/* ── Perfil del motorizado con foto ── */
async function editMiPerfilMoto(){
  const dels=await dbAll('deliveries');
  const miDel=dels.find(d=>d.usuarioId===S.user.id)||dels.find(d=>d.nombre===S.user.nombre);
  if(!miDel){toast('Tu perfil de motorizado no está vinculado — avisa al admin','bad');return;}
  openSheet(`<div class="sh-head"><h3>Mi perfil</h3></div>
   <div style="text-align:center;margin-bottom:16px">
     ${miDel.fotoURL?`<img src="${miDel.fotoURL}" style="width:100px;height:100px;border-radius:24px;object-fit:cover;border:3px solid var(--glow)">`:
     `<div style="width:100px;height:100px;border-radius:24px;background:var(--panel2);display:grid;place-items:center;font-size:36px;margin:0 auto">🛵</div>`}
     <div style="font-weight:700;font-size:17px;margin-top:10px">${esc(miDel.nombre)}</div>
     <div style="font-size:12px;color:var(--muted)">${esc(miDel.telefono||'')}</div>
   </div>
   <div class="field"><label>📷 Cambiar foto de perfil</label>
     <input type="file" id="perfilFoto" accept="image/*" class="inp" style="padding:10px">
   </div>
   <button class="btn pri full" onclick="savePerfilMotoFoto('${miDel.id}')">Guardar foto</button>`);
}

async function savePerfilMotoFoto(delId){
  const file=document.getElementById('perfilFoto')?.files?.[0];
  if(!file){toast('Selecciona una foto','bad');return;}
  try{
    const ref=storage.ref(`perfiles/${delId}/${Date.now()}.jpg`);
    await ref.put(file);
    const url=await ref.getDownloadURL();
    const d=await dbGet('deliveries',delId);
    d.fotoURL=url;
    await dbPut('deliveries',d);
    toast('Foto actualizada ✓','ok');closeSheet();viewMoto();
  }catch(e){toast('Error: '+e.message,'bad');}
}

/* ── Generar link de WhatsApp para notificar al motorizado ── */
function notificarMotoWhatsApp(p,delivery){
  const tel=(delivery.telefono||'').replace(/\D/g,'');
  if(!tel){toast('El motorizado no tiene teléfono registrado','bad');return;}
  const debe=(p.totalUSD||0)-(p.totalPagadoUSD||0);
  const items=(p.items||[]).map(i=>`${i.cantidad}x ${i.version}`).join(', ');
  const msg=encodeURIComponent(
`🛵 *NUEVA ENTREGA — Firefly*

Cliente: ${p.cliente?.nombre||''}
Zona: ${p.cliente?.zona||''}
Producto: ${items}
${debe>0.5?`Cobrar: $${debe.toFixed(2)}`:'✓ Ya pagó'}

Entra a tu portal para aceptarla:
https://firefly-panel.onrender.com

Pedido ${p.codigo}`);
  window.open(`https://wa.me/${tel.startsWith('58')?tel:'58'+tel.replace(/^0/,'')}?text=${msg}`,'_blank');
}


async function notifMotoDesdeDetalle(pedId){
  const[p,dels]=await Promise.all([dbGet('pedidos',pedId),dbAll('deliveries')]);
  if(!p)return;
  const delivery=dels.find(d=>d.id===p.deliveryId);
  if(!delivery){toast('Este pedido no tiene motorizado asignado','bad');return;}
  // Marcar como despachado si estaba por despachar
  if(p.estado==='POR_DESPACHAR'){
    p.estado='DESPACHADO';p.motoEstado='ASIGNADO';
    p.timeline=[...(p.timeline||[]),{estado:'DESPACHADO',ts:Date.now(),por:S.user.nombre,nota:'Notificado a '+delivery.nombre}];
    S.cache.peds=null;
    await dbPut('pedidos',p);
  }
  notificarMotoWhatsApp(p,delivery);
}
/* ---- Sheet & confirm ---- */
function openSheet(html){$('#sheetBody').innerHTML=html;$('#scrim').classList.add('show');document.body.style.overflow='hidden';}
function closeSheet(){$('#scrim').classList.remove('show');document.body.style.overflow='';}
function confirmSheet(title,msg,onYes){
  openSheet(`<div class="sh-head"><h3>${esc(title)}</h3></div>${msg?`<p style="color:var(--muted);margin-top:-4px;font-size:14px">${esc(msg)}</p>`:''}
   <button class="btn dang full" id="cfYes">Sí, continuar</button>
   <button class="btn gho full" style="margin-top:9px" onclick="closeSheet()">Cancelar</button>`);
  $('#cfYes').onclick=onYes;}
</script>
